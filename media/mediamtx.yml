---
logLevel: info
logDestinations:
  - stdout
logFile: mediamtx.log
readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1472
rtsp: yes
rtspTransports:
  - udp
  - multicast
  - tcp
authInternalUsers:
  - user: admin
    pass: FJQLLY
    permissions:
      - action: publish
        path: cam
      - action: read
        path: cam
paths:
  cam:
    runOnInit: ffmpeg -f v4l2 -input_format mjpeg -framerate 15 -video_size 1280x720 -i /dev/video0 -vf "drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSansMono-Bold.ttf:fontsize=60:text='%{localtime\:%H\\\\\:%M}':x=(w-tw)/2:y=h-(2*lh):fontcolor=white" -c:v libx264 -preset ultrafast -tune zerolatency -b:v 900k -g 30 -an -f rtsp rtsp://admin:FJQLLY@localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
